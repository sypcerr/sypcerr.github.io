<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SteamBundleDB - Steam Bundle Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000000;
      --bg-elevated: #0a0a0a;
      --bg-card: #111111;
      --border: #1a1a1a;
      --border-light: #2a2a2a;
      --text: #ffffff;
      --text-muted: #555555;
      --green: #00ff88;
      --orange: #ff9500;
      --red: #ff3b30;
      --blue: #0099ff;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; overflow-x: hidden; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
    header { margin-bottom: 40px; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s ease forwards; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    .logo { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    h1 { font-size: clamp(32px, 5vw, 48px); font-weight: 300; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 12px; }
    .subtitle { font-size: 14px; color: var(--text-muted); max-width: 500px; }
    .input-row { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; opacity: 0; animation: fadeInUp 0.6s ease 0.1s forwards; }
    input, select { padding: 12px 16px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, select:focus { outline: none; border-color: var(--border-light); box-shadow: 0 0 0 2px rgba(255,255,255,0.05); }
    input::placeholder { color: var(--text-muted); }
    select { cursor: pointer; }
    select option { background: var(--bg-elevated); color: var(--text); }
    button { padding: 12px 24px; background: var(--text); color: var(--bg); border: none; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,255,255,0.1); }
    button:active { transform: translateY(0); }
    .filters { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); opacity: 0; animation: fadeInUp 0.6s ease 0.2s forwards; }
    .filters-title { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
    .filter-btn { padding: 10px 14px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 12px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--border-light); color: var(--text); }
    .filter-btn.active { border-color: var(--text); color: var(--text); background: var(--bg-card); }
    .stats { display: flex; gap: 32px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); flex-wrap: wrap; opacity: 0; animation: fadeInUp 0.6s ease 0.3s forwards; }
    .stat { display: flex; flex-direction: column; gap: 4px; }
    .stat-value { font-size: 24px; font-weight: 300; letter-spacing: -0.02em; }
    .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-top: 32px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 16px; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; opacity: 0; transform: translateY(20px); }
    .card.visible { opacity: 1; transform: translateY(0); transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.2s, box-shadow 0.2s; }
    .card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; flex: 1; }
    .badge { font-size: 9px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; border: 1px solid; white-space: nowrap; }
    .badge-expiring { border-color: var(--orange); color: var(--orange); }
    .badge-high-discount { border-color: var(--green); color: var(--green); }
    .badge-standard { border-color: var(--border-light); color: var(--text-muted); }
    .card-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-value { font-size: 15px; font-weight: 500; }
    .meta-label { font-size: 9px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
    .card-thumb { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; background: var(--bg-elevated); }
    .card-shop { font-size: 11px; color: var(--text-muted); }
    .card-expires { font-size: 11px; color: var(--orange); }
    .card-actions { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .action-btn { flex: 1; padding: 10px 14px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-weight: 500; text-align: center; text-decoration: none; transition: all 0.2s; display: block; }
    .action-btn:hover { border-color: var(--border-light); }
    .action-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .action-btn.primary:hover { opacity: 0.9; }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty h3 { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .status-bar { margin-top: 16px; padding: 12px 16px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; opacity: 0; animation: fadeInUp 0.6s ease 0.4s forwards; }
    .status-indicator { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); transition: background 0.3s; }
    .status-dot.loading { background: var(--orange); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--red); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .error-message { background: rgba(255,59,48,0.1); border: 1px solid var(--red); border-radius: 6px; padding: 16px; margin-top: 16px; color: var(--red); font-size: 13px; }
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 32px; padding-top: 32px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .page-btn { padding: 8px 16px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .page-btn:hover { border-color: var(--border-light); color: var(--text); }
    .page-btn.active { border-color: var(--text); color: var(--text); background: var(--bg-card); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    @media (max-width: 768px) {
      .container { padding: 24px 16px; }
      h1 { font-size: 28px; }
      .input-row { flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .stats { gap: 20px; }
      .filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">SteamBundleDB</div>
      <h1>Steam Bundle Explorer</h1>
      <p class="subtitle">Browse and filter current game bundles from Humble, Fanatical, and more.</p>

      <div class="input-row">
        <input type="text" id="search" placeholder="Search bundles..." style="flex: 2; min-width: 200px;" />
        <select id="sortBy" style="flex: 1; min-width: 150px;">
          <option value="discount">Highest Discount</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="items">Most Items</option>
          <option value="expiry">Expiring Soon</option>
        </select>
        <button id="loadBtn">Refresh</button>
      </div>

      <div class="input-row">
        <input type="number" id="minPrice" placeholder="Min Price ($)" style="flex: 1; min-width: 100px;" />
        <input type="number" id="maxPrice" placeholder="Max Price ($)" style="flex: 1; min-width: 100px;" />
        <input type="number" id="minDiscount" placeholder="Min Discount %" style="flex: 1; min-width: 100px;" />
        <input type="number" id="minItems" placeholder="Min Items" style="flex: 1; min-width: 100px;" />
      </div>

      <div class="filters">
        <div class="filters-title">Quick Filters</div>
        <div class="filter-grid" id="filters"></div>
      </div>

      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Loading...</span>
        </div>
        <div id="lastUpdate">Last update: Never</div>
      </div>

      <div class="stats" id="stats"></div>
    </header>

    <section class="grid" id="grid"></section>
    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    var API_KEY = '769e9a20ea4ca1e4f10a5569871d4244f80854de';
    var PROXY   = 'https://api.allorigins.win/get?url=';

    var Service = {
      cache: null,
      cacheTime: 0,
      cacheTTL: 3600000,
      currentPage: 1,
      itemsPerPage: 24,

      async fetchBundles() {
        // Use cache if fresh
        if (this.cache && (Date.now() - this.cacheTime < this.cacheTTL)) {
          return this.cache;
        }

        var results = [];
        var offset = 0;
        var hasMore = true;

        // Fetch up to 3 pages (150 bundles max)
        while (hasMore && offset < 150) {
          var itadUrl = 'https://api.isthereanydeal.com/bundles/v2?key=' + API_KEY + '&limit=50&offset=' + offset;
          var proxyUrl = PROXY + encodeURIComponent(itadUrl);

          var response = await fetch(proxyUrl);
          if (!response.ok) throw new Error('Proxy request failed: ' + response.status);

          var wrapper = await response.json();
          if (!wrapper.contents) throw new Error('Empty proxy response');

          var data = JSON.parse(wrapper.contents);

          if (!data || !data.list || data.list.length === 0) break;

          for (var i = 0; i < data.list.length; i++) {
            var b = data.list[i];
            var deal = b.deal || {};
            var price = deal.price && typeof deal.price === 'object' ? deal.price.amount : (deal.price || 0);
            var priceOld = deal.regular && typeof deal.regular === 'object' ? deal.regular.amount : (deal.regular || price);
            var cut = deal.cut || 0;
            var expires = deal.until ? new Date(deal.until) : null;

            results.push({
              id:            b.id || offset + i,
              name:          b.title || 'Unknown Bundle',
              price:         price,
              originalPrice: priceOld,
              discount:      cut,
              items:         (b.counts && b.counts.games) || 0,
              shop:          (b.shop && b.shop.title) || '',
              url:           deal.url || deal.link || '',
              image:         (b.assets && (b.assets.banner600 || b.assets.banner375 || b.assets.icon)) || '',
              expires:       expires,
              type:          expires ? 'expiring' : (cut >= 50 ? 'high-discount' : 'standard')
            });
          }

          hasMore = data.hasMore || false;
          offset += 50;
        }

        if (results.length === 0) throw new Error('No bundles returned from API');

        this.cache = results;
        this.cacheTime = Date.now();
        return results;
      },

      filter(bundles, f) {
        return bundles.filter(function(b) {
          if (f.search && !b.name.toLowerCase().includes(f.search.toLowerCase())) return false;
          if (f.minPrice !== null && b.price < f.minPrice) return false;
          if (f.maxPrice !== null && b.price > f.maxPrice) return false;
          if (f.minDiscount !== null && b.discount < f.minDiscount) return false;
          if (f.minItems !== null && b.items < f.minItems) return false;
          if (f.onlyExpiring && b.type !== 'expiring') return false;
          if (f.onlyFree && b.price > 0) return false;
          if (f.onlyHighDiscount && b.discount < 50) return false;
          return true;
        });
      },

      sort(bundles, by) {
        var s = bundles.slice();
        switch (by) {
          case 'price-asc':    return s.sort(function(a,b){ return a.price - b.price; });
          case 'price-desc':   return s.sort(function(a,b){ return b.price - a.price; });
          case 'items':        return s.sort(function(a,b){ return b.items - a.items; });
          case 'expiry':       return s.sort(function(a,b){
            if (!a.expires && !b.expires) return 0;
            if (!a.expires) return 1;
            if (!b.expires) return -1;
            return a.expires - b.expires;
          });
          case 'discount':
          default:             return s.sort(function(a,b){ return b.discount - a.discount; });
        }
      },

      stats(bundles) {
        var totalSavings = 0, totalDiscount = 0, totalItems = 0;
        for (var i = 0; i < bundles.length; i++) {
          totalSavings  += Math.max(0, bundles[i].originalPrice - bundles[i].price);
          totalDiscount += bundles[i].discount;
          totalItems    += bundles[i].items;
        }
        return {
          count:       bundles.length,
          avgDiscount: bundles.length ? (totalDiscount / bundles.length).toFixed(1) : '0.0',
          totalSavings: totalSavings.toFixed(2),
          totalItems:  totalItems
        };
      }
    };

    // ---- UI State ----
    var allBundles = [];
    var quickFilters = { onlyExpiring: false, onlyFree: false, onlyHighDiscount: false };

    var els = {
      grid:        document.getElementById('grid'),
      filtersEl:   document.getElementById('filters'),
      search:      document.getElementById('search'),
      stats:       document.getElementById('stats'),
      loadBtn:     document.getElementById('loadBtn'),
      sortBy:      document.getElementById('sortBy'),
      minPrice:    document.getElementById('minPrice'),
      maxPrice:    document.getElementById('maxPrice'),
      minDiscount: document.getElementById('minDiscount'),
      minItems:    document.getElementById('minItems'),
      statusDot:   document.getElementById('statusDot'),
      statusText:  document.getElementById('statusText'),
      lastUpdate:  document.getElementById('lastUpdate'),
      pagination:  document.getElementById('pagination')
    };

    var filterDefs = [
      { label: 'Expiring Soon', key: 'onlyExpiring' },
      { label: 'Free Only',     key: 'onlyFree' },
      { label: 'High Discount (≥50%)', key: 'onlyHighDiscount' }
    ];

    function initFilterBtns() {
      filterDefs.forEach(function(def) {
        var btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = def.label;
        btn.onclick = function() {
          btn.classList.toggle('active');
          quickFilters[def.key] = btn.classList.contains('active');
          Service.currentPage = 1;
          render(getFiltered());
        };
        els.filtersEl.appendChild(btn);
      });
    }

    function setStatus(text, loading, error) {
      els.statusText.textContent = text;
      els.statusDot.classList.toggle('loading', !!loading);
      els.statusDot.classList.toggle('error',   !!error);
    }

    function getFiltered() {
      var filtered = Service.filter(allBundles, {
        search:          els.search.value.trim(),
        minPrice:        els.minPrice.value    ? parseFloat(els.minPrice.value)    : null,
        maxPrice:        els.maxPrice.value    ? parseFloat(els.maxPrice.value)    : null,
        minDiscount:     els.minDiscount.value ? parseFloat(els.minDiscount.value) : null,
        minItems:        els.minItems.value    ? parseInt(els.minItems.value)       : null,
        onlyExpiring:    quickFilters.onlyExpiring,
        onlyFree:        quickFilters.onlyFree,
        onlyHighDiscount: quickFilters.onlyHighDiscount
      });
      return Service.sort(filtered, els.sortBy.value);
    }

    function formatExpiry(date) {
      if (!date) return '';
      var diff = date - Date.now();
      var days = Math.ceil(diff / 86400000);
      if (days < 0)  return 'Expired';
      if (days === 0) return 'Expires today';
      if (days === 1) return 'Expires tomorrow';
      return 'Expires in ' + days + ' days';
    }

    function render(filtered) {
      var start = (Service.currentPage - 1) * Service.itemsPerPage;
      var page  = filtered.slice(start, start + Service.itemsPerPage);

      els.grid.innerHTML = '';

      if (filtered.length === 0) {
        els.grid.innerHTML = '<div class="empty"><h3>No bundles found</h3><p>Try adjusting your filters</p></div>';
        renderStats([]);
        renderPagination(0);
        return;
      }

      page.forEach(function(bundle, idx) {
        var card = document.createElement('div');
        card.className = 'card';

        var badgeClass = 'badge-standard';
        var badgeLabel = 'Standard';
        if (bundle.type === 'expiring')      { badgeClass = 'badge-expiring';      badgeLabel = 'Expiring Soon'; }
        else if (bundle.type === 'high-discount') { badgeClass = 'badge-high-discount'; badgeLabel = 'High Discount'; }

        var priceDisplay    = bundle.price > 0 ? '$' + bundle.price.toFixed(2) : 'Free';
        var originalDisplay = bundle.originalPrice > bundle.price ? '$' + bundle.originalPrice.toFixed(2) : '';
        var savings         = bundle.originalPrice - bundle.price;
        var savingsDisplay  = savings > 0.01 ? '-$' + savings.toFixed(2) : '—';
        var expiryText      = formatExpiry(bundle.expires);
        var imgHtml         = bundle.image ? '<img class="card-thumb" src="' + bundle.image + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '';
        var bundleUrl       = bundle.url || '#';

        card.innerHTML =
          imgHtml +
          '<div class="card-header">' +
            '<div class="card-title">' + bundle.name + '</div>' +
            '<span class="badge ' + badgeClass + '">' + badgeLabel + '</span>' +
          '</div>' +
          '<div class="card-meta">' +
            '<div class="meta-item"><div class="meta-value">' + priceDisplay + '</div><div class="meta-label">Price</div></div>' +
            '<div class="meta-item"><div class="meta-value">' + bundle.discount + '%</div><div class="meta-label">Discount</div></div>' +
            '<div class="meta-item"><div class="meta-value">' + bundle.items + '</div><div class="meta-label">Games</div></div>' +
            '<div class="meta-item"><div class="meta-value">' + savingsDisplay + '</div><div class="meta-label">Savings</div></div>' +
          '</div>' +
          (bundle.shop   ? '<div class="card-shop">' + bundle.shop + '</div>' : '') +
          (expiryText    ? '<div class="card-expires">⏱ ' + expiryText + '</div>' : '') +
          '<div class="card-actions">' +
            '<a class="action-btn primary" href="' + bundleUrl + '" target="_blank" rel="noopener">View Bundle →</a>' +
          '</div>';

        els.grid.appendChild(card);
        setTimeout(function() { card.classList.add('visible'); }, idx * 40);
      });

      renderStats(filtered);
      renderPagination(filtered.length);
    }

    function renderStats(bundles) {
      var s = Service.stats(bundles);
      els.stats.innerHTML =
        '<div class="stat"><div class="stat-value">' + s.count + '</div><div class="stat-label">Bundles</div></div>' +
        '<div class="stat"><div class="stat-value">' + s.avgDiscount + '%</div><div class="stat-label">Avg Discount</div></div>' +
        '<div class="stat"><div class="stat-value">$' + s.totalSavings + '</div><div class="stat-label">Total Savings</div></div>' +
        '<div class="stat"><div class="stat-value">' + s.totalItems + '</div><div class="stat-label">Total Games</div></div>';
    }

    function renderPagination(total) {
      els.pagination.innerHTML = '';
      var totalPages = Math.ceil(total / Service.itemsPerPage);
      if (totalPages <= 1) return;

      function pageBtn(label, page, active, disabled) {
        var btn = document.createElement('button');
        btn.className = 'page-btn' + (active ? ' active' : '');
        btn.textContent = label;
        btn.disabled = disabled;
        btn.onclick = function() {
          Service.currentPage = page;
          render(getFiltered());
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        els.pagination.appendChild(btn);
      }

      pageBtn('←', Service.currentPage - 1, false, Service.currentPage === 1);
      var start = Math.max(1, Service.currentPage - 2);
      var end   = Math.min(totalPages, start + 4);
      for (var i = start; i <= end; i++) pageBtn(i, i, i === Service.currentPage, false);
      pageBtn('→', Service.currentPage + 1, false, Service.currentPage === totalPages);
    }

    function applyFilters() {
      Service.currentPage = 1;
      render(getFiltered());
    }

    async function load(forceRefresh) {
      setStatus('Fetching bundles...', true);
      els.loadBtn.disabled = true;

      if (forceRefresh) Service.cache = null;

      try {
        allBundles = await Service.fetchBundles();
        setStatus('Loaded ' + allBundles.length + ' bundles', false, false);
        els.lastUpdate.textContent = 'Last update: ' + new Date().toLocaleTimeString();
        render(getFiltered());
      } catch (err) {
        setStatus('Failed to load', false, true);
        els.grid.innerHTML =
          '<div class="error-message">' +
          '<strong>Error:</strong> ' + err.message +
          '<p style="margin-top:8px;color:var(--text-muted)">The proxy may be temporarily unavailable. Try again in a moment.</p>' +
          '</div>';
      }

      els.loadBtn.disabled = false;
    }

    // ---- Event Listeners ----
    var debounce;
    function onInput() {
      clearTimeout(debounce);
      debounce = setTimeout(applyFilters, 300);
    }

    els.search.addEventListener('input', onInput);
    els.sortBy.addEventListener('change', applyFilters);
    [els.minPrice, els.maxPrice, els.minDiscount, els.minItems].forEach(function(el) {
      el.addEventListener('input', onInput);
    });
    els.loadBtn.addEventListener('click', function() { load(true); });

    // ---- Init ----
    initFilterBtns();
    load(false);
  </script>
</body>
</html>
