<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Web Pool</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0d10;
      --bg-soft: #12151b;
      --card: #161a22;
      --text: #e6e8ee;
      --muted: #9aa1b2;
      --accent: #7c8cff;
      --accent-soft: rgba(124, 140, 255, 0.15);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #1a2040, transparent),
                  radial-gradient(800px 500px at 90% 10%, #2a1a3d, transparent),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 40px;
    }

    .title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--muted);
      max-width: 640px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .random-btn {
      padding: 16px 26px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 999px;
      background: linear-gradient(135deg, #7c8cff, #a78bfa);
      color: #0b0d10;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(124, 140, 255, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .random-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 14px 40px rgba(124, 140, 255, 0.45);
    }

    .search {
      flex: 1;
      min-width: 220px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #222838;
      background: var(--bg-soft);
      color: var(--text);
      outline: none;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .filter-btn {
      padding: 8px 14px;
      font-size: 0.85rem;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid #222838;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .filter-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }

    .meta {
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent), var(--card);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #222838;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    .card h3 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .tag {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }

    .visit {
      margin-top: auto;
      padding: 10px 14px;
      border-radius: 10px;
      background: #1f2433;
      border: 1px solid #2a3045;
      font-weight: 600;
      text-align: center;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .visit:hover {
      background: #262c40;
      transform: translateY(-1px);
    }

    @media (max-width: 600px) {
      .top-actions { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="title">Random Web Pool</div>
      <div class="subtitle">
        A curated pool of interesting, creative, fun, and useful websites from across the internet.
        Press the button. Discover something new.
      </div>

      <div class="top-actions">
        <button class="random-btn" id="randomBtn">Random Website</button>
        <input class="search" id="search" placeholder="Search websites…" />
      </div>

      <div class="filters" id="filters"></div>
      <div class="meta" id="counter"></div>
    </header>

    <section class="grid" id="grid"></section>
  </div>

  <script>
    const websites = [
     {
        name: "Square Face Generator",
        description: "Create a Square Face Icon.",
        url: "https://theuselessweb.com",
        categories: ["Fun", "Art"]
      },
      {
        name: "Radio Garden",
        description: "Explore live radio stations from around the world on a 3D globe.",
        url: "https://radio.garden",
        categories: ["Fun", "Music", "Personal Favourite"]
      },
      {
        name: "Have I Been Pwned",
        description: "Check if your email address has appeared in a data breach.",
        url: "https://haveibeenpwned.com",
        categories: ["Tools", "Security"]
      },
      {
        name: "Quick, Draw!",
        description: "A neural network tries to guess what you're drawing.",
        url: "https://quickdraw.withgoogle.com",
        categories: ["AI", "Fun", "Game"]
      },
      {
        name: "Optical Toys",
        description: "Optical Illusions & Brain Bending Toys.",
        url: "https://optical.toys",
        categories: ["Fun", "Art"]
      },
      {
        name: "React Bits",
        description: "Modern React UI patterns, hooks, and animation building blocks.",
        url: "https://reactbits.dev/get-started/installation",
        categories: ["Development", "Tools"]
      },
      {
        name: "Shader Gradiant",
        description: "Create your own Motion Background!",
        url: "https://shadergradient.co/customize",
        categories: ["Development", "Fun", "Art"]
      },
      {
        name: "Image to ASCII",
        description: "ASCII art generator to easily and quickly convert your photos into text-based art.",
        url: "https://www.asciiart.eu/image-to-ascii",
        categories: ["Fun", "Art"]
      },
      {
        name: "Taste Atlas",
        description: "Explore a Map with Food and Recipies around the world.",
        url: "https://www.tasteatlas.com/map",
        categories: ["Fun"]
      },
      {
        name: "Spline",
        description: "3D Website Design Platform - Create and Collaborate",
        url: "https://spline.design",
        categories: ["Development", "Tools"]
      },
      {
        name: "Heatmap Maker",
        description: "Create a Heatmap Logo, or put one over any image",
        url: "https://app.paper.design/playground/heatmap",
        categories: ["Art", "Tools"]
      },
      {
        name: "Home Design Planner",
        description: "Design a room or house with ikea products",
        url: "https://www.ikea.com/us/en/home-design/",
        categories: ["Tools"]
      },
      {
        name: "PerlerBeads",
        description: "Upload an image and instantly convert it to a printable bead pattern.",
        url: "https://pixelbeads.pics",
        categories: ["Fun", "Art"]
      },
      {
        name: "MoeWalls",
        description: "Thousands of multiple Live Wallpapers",
        url: "https://moewalls.com",
        categories: ["Tools", "Art"]
      },
      {
        name: "Drifted",
        description: "Play a variety of drifting games online",
        url: "https://www.drifted.com",
        categories: ["Fun", "Game"]
      },
      {
        name: "Cursify",
        description: "Browse or test multiple Cursor Animations and copy code for your website.",
        url: "https://cursify.vercel.app",
        categories: ["Development"]
      },
      {
        name: "Funes World",
        description: "Cultural Heritage Archive of 3D Models, which you can also download.",
        url: "https://funes.world",
        categories: ["Development", "Fun"]
      },
      {
        name: "City Roads",
        description: "Draw all Roads in a city or town.",
        url: "https://anvaka.github.io/city-roads/",
        categories: ["Art", "Fun"]
      },
      {
        name: "Hammyhome",
        description: "Raise your own hamster simulator",
        url: "https://hammyhome.com",
        categories: ["Game", "Fun"]
      },
      {
        name: "3DTuning",
        description: "On-line car configurator for more than 600 models.",
        url: "https://www.3dtuning.com/",
        categories: ["Tools", "Fun"]
      },
      {
        name: "Meta 3D Model Generator",
        description: "Upload an image and turn it into a 3D Model! (Keep in mind this is meta)",
        url: "https://aidemos.meta.com/segment-anything/editor/convert-image-to-3d",
        categories: ["Tools", "Development", "AI", "Personal Favourite"]
      },
      {
        name: "iFixIt",
        description: "Thousands more step-by-step guides to fix every thing",
        url: "https://www.ifixit.com/Guide",
        categories: ["Tools", "Personal Favourite"]
      },
      {
        name: "iLoveImg",
        description: "A web-based image editor that supports bulk image editing and common photo adjustment tools.",
        url: "https://www.iloveimg.com",
        categories: ["Tools", "Personal Favourite"]
      },
      {
        name: "MetaData2Go",
        description: "Improve Privacy and Security with One-Click Metadata Removal.",
        url: "https://www.metadata2go.com/delete-metadata",
        categories: ["Tools", "Personal Favourite", "Security"]
      },
      {
        name: "TheToyMaker",
        description: "A site with free printable paper toys and crafts for kids and adults.",
        url: "https://thetoymaker.com",
        categories: ["Tools", "Art", "Fun"]
      },
      {
        name: "AutoDraw",
        description: "A free AI tool that turns rough sketches into clean, polished drawings instantly online.",
        url: "https://autodraw.com",
        categories: ["Tools", "Art", "Fun"]
      },
      {
        name: "Floor796",
        description: "An interactive pixel‑art sci‑fi animation world packed with pop‑culture references and exploration.",
        url: "https://floor796.com/",
        categories: ["Art", "Fun"]
      },
      {
        name: "ObjectiveUnclear",
        description: "A 3D interactive flight‑tracking web app showing real‑time aircraft paths around selected airports.",
        url: "https://objectiveunclear.com/airloom.html?airport=BER",
        categories: ["Tools"]
      },
      {
        name: "GrabCraft",
        description: "Minecraft building blueprints and structure ideas for creative construction in the game.",
        url: "https://www.grabcraft.com",
        categories: ["Game", "Tools"]
      },
      {
        name: "PngImg",
        description: "A large free library of transparent PNG images and icons for design and creative use.",
        url: "https://pngimg.com",
        categories: ["Art", "Tools"]
      },
      {
        name: "ToughLoveArena",
        description: "A free browser‑based indie 2D fighting game with simple controls, online play, and rollback netcode.",
        url: "https://toughlovearena.com",
        categories: ["Game", "Fun"]
      },
      {
        name: "Versus",
        description: "A data‑driven comparison website that lets you side‑by‑side compare products, specs, and decisions.",
        url: "https://versus.com/",
        categories: ["Tools", "Personal Favourite"]
      },
      {
        name: "Pomelli by Google",
        description: "A data‑driven comparison website that lets you side‑by‑side compare products, specs, and decisions.",
        url: "https://labs.google.com/pomelli",
        categories: ["Tools", "Personal Favourite", "AI", "Development"]
      },
      {
        name: "DrawAFish",
        description: "A playful online drawing game where you sketch fish that swim together in a shared virtual tank.",
        url: "https://drawafish.com",
        categories: ["Fun", "Art", "Game"]
      },
      {
        name: "APIFreeLLM",
        description: "A platform offering free unlimited access to model APIs for developers.",
        url: "https://apifreellm.com/en",
        categories: ["AI", "Development", "Personal Favourite"]
      },
      {
        name: "3DAimTrainer",
        description: "A free online aim‑training platform helping FPS gamers improve accuracy and reflex skills.",
        url: "https://www.3daimtrainer.com",
        categories: ["Game", "Tools"]
      },

    ];

    const grid = document.getElementById('grid');
    const filtersEl = document.getElementById('filters');
    const searchEl = document.getElementById('search');
    const counterEl = document.getElementById('counter');
    const randomBtn = document.getElementById('randomBtn');

    const activeCategories = new Set();
    const categories = [...new Set(websites.flatMap(w => w.categories))];

    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = cat;
      btn.onclick = () => {
        btn.classList.toggle('active');
        btn.classList.contains('active') ? activeCategories.add(cat) : activeCategories.delete(cat);
        render();
      };
      filtersEl.appendChild(btn);
    });

    function getVisibleWebsites() {
      const query = searchEl.value.toLowerCase();
      return websites.filter(w => {
        const matchesSearch =
          w.name.toLowerCase().includes(query) ||
          w.description.toLowerCase().includes(query);

        // ✅ Only show websites that include ALL active categories
        const matchesCategory =
          activeCategories.size === 0 ||
          [...activeCategories].every(cat => w.categories.includes(cat));

        return matchesSearch && matchesCategory;
      });
    }

    function render() {
      const visible = getVisibleWebsites();
      grid.innerHTML = '';

      visible.forEach(w => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="display:flex; gap:6px; flex-wrap:wrap;">
            ${w.categories.map(cat => `<span class="tag">${cat}</span>`).join('')}
          </div>
          <h3>${w.name}</h3>
          <p>${w.description}</p>
          <a class="visit" href="${w.url}" target="_blank" rel="noopener">Visit</a>
        `;
        grid.appendChild(card);
      });

      counterEl.textContent = `${visible.length} website${visible.length !== 1 ? 's' : ''} in pool`;
    }

    randomBtn.onclick = () => {
      const visible = getVisibleWebsites();
      if (!visible.length) return;
      const random = visible[Math.floor(Math.random() * visible.length)];
      window.open(random.url, '_blank', 'noopener');
    };

    searchEl.addEventListener('input', render);
    render();
  </script>
</body>
</html>
